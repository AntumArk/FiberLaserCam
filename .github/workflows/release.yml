name: Release KiCad Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (example: v0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve release version
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ inputs.tag }}"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Release version is empty. Use a tag push or provide workflow_dispatch input 'tag'." >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Build KiCad package zip
        id: build
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.vars.outputs.version }}"
          VERSION_NO_V="${{ steps.vars.outputs.version_no_v }}"

          rm -rf package release
          mkdir -p package/plugins/.deps package/resources release

          cp -a ./*.py package/plugins/
          cp -a LICENSE README.md requirements.txt icon_fiber_laser.xpm package/plugins/
          cp -a img package/plugins/

          python3 -m pip install --upgrade pip

          # ezdxf declares numpy and fonttools as hard dependencies on PyPI,
          # but this plugin only uses ezdxf's core DXF read/write API
          # (ezdxf.readfile, ezdxf.new, add_line/add_lwpolyline/add_polyline2d),
          # which never touches numpy or fonttools.
          # Installing with --no-deps keeps the bundled .deps folder small and
          # avoids shipping numpy's platform/ABI-specific compiled wheels,
          # which previously caused silent plugin load failures whenever a
          # user's KiCad-bundled Python didn't match the CI runner's ABI.
          # ezdxf's own optional compiled accelerators (ezdxf/acc/*.so) degrade
          # gracefully to a pure-python fallback when their ABI doesn't match,
          # so a single flat .deps folder works across all Python versions.
          python3 -m pip install --only-binary=:all: --prefer-binary --no-deps --target package/plugins/.deps -r requirements.txt

          cp packaging/icon.png package/resources/icon.png

          cp packaging/metadata.template.json package/metadata.json

          python3 - <<PY
          import json

          path = "package/metadata.json"
          with open(path, "r", encoding="utf-8") as f:
              metadata = json.load(f)

          metadata["versions"][0]["version"] = "${VERSION_NO_V}"

          with open(path, "w", encoding="utf-8") as f:
              json.dump(metadata, f, indent=2)
              f.write("\n")
          PY

          python3 -m json.tool package/metadata.json > /dev/null

          ZIP_NAME="FiberLaserCam-${VERSION}-kicad-plugin.zip"
          (
            cd package
            zip -r "../release/${ZIP_NAME}" .
          )

          sha256sum "release/${ZIP_NAME}" > "release/${ZIP_NAME}.sha256"

          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FiberLaserCam-${{ steps.vars.outputs.version }}
          path: |
            release/${{ steps.build.outputs.zip_name }}
            release/${{ steps.build.outputs.zip_name }}.sha256

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.version }}
          name: FiberLaserCam ${{ steps.vars.outputs.version }}
          files: |
            release/${{ steps.build.outputs.zip_name }}
            release/${{ steps.build.outputs.zip_name }}.sha256
          generate_release_notes: true
