name: Release KiCad Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (example: v0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve release version
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ inputs.tag }}"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Release version is empty. Use a tag push or provide workflow_dispatch input 'tag'." >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Build KiCad package zip
        id: build
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.vars.outputs.version }}"
          VERSION_NO_V="${{ steps.vars.outputs.version_no_v }}"
          ZIP_NAME="FiberLaserCam-${VERSION}-kicad-plugin.zip"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/${ZIP_NAME}"

          rm -rf package release
          mkdir -p package/plugins package/resources release

          cp -a ./*.py package/plugins/
          cp -a LICENSE README.md icon_fiber_laser.xpm package/plugins/
          cp -a img package/plugins/

          cp packaging/icon.png package/resources/icon.png

          cp packaging/metadata.template.json package/metadata.json

          python3 - <<PY
          import json

          path = "package/metadata.json"
          with open(path, "r", encoding="utf-8") as f:
              metadata = json.load(f)

          metadata["versions"][0]["version"] = "${VERSION_NO_V}"
          metadata["versions"][0]["download_url"] = "${DOWNLOAD_URL}"

          with open(path, "w", encoding="utf-8") as f:
              json.dump(metadata, f, indent=2)
              f.write("\n")
          PY

          python3 -m json.tool package/metadata.json > /dev/null

          cp package/metadata.json release/metadata.json
          python3 -m json.tool release/metadata.json > /dev/null

          (
            cd package
            zip -r "../release/${ZIP_NAME}" .
          )

          sha256sum "release/${ZIP_NAME}" > "release/${ZIP_NAME}.sha256"

          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build PCM repository index (packages.json / repository.json)
        id: pcm_index
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.vars.outputs.version }}"
          VERSION_NO_V="${{ steps.vars.outputs.version_no_v }}"
          ZIP_NAME="${{ steps.build.outputs.zip_name }}"
          REPO="${{ github.repository }}"

          # download_url is pinned to this specific tag's release asset, so it
          # keeps working forever even after newer releases are published.
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${VERSION}/${ZIP_NAME}"
          DOWNLOAD_SHA256="$(cut -d' ' -f1 "release/${ZIP_NAME}.sha256")"
          DOWNLOAD_SIZE="$(stat -c%s "release/${ZIP_NAME}")"
          INSTALL_SIZE="$(du -sb package | cut -f1)"

          # packaging/packages.json is the git-tracked source of truth for
          # version history (kept in sync by .githooks/pre-push and by this
          # step), so no network fetch of a previous release asset is needed
          # here and no version history can be lost to release-ordering races.
          python3 packaging/update_packages_json.py \
            --version "${VERSION_NO_V}" \
            --download-sha256 "${DOWNLOAD_SHA256}" \
            --download-url "${DOWNLOAD_URL}" \
            --download-size "${DOWNLOAD_SIZE}" \
            --install-size "${INSTALL_SIZE}"

          python3 -c "import json; p='packaging/packages.json'; required=('download_sha256','download_url','download_size','install_size'); data=json.load(open(p, encoding='utf-8')); [pkg.update({'versions':[v for v in pkg.get('versions', []) if all(v.get(k) not in (None, '') for k in required)]}) for pkg in data.get('packages', [])]; json.dump(data, open(p, 'w', encoding='utf-8'), indent=2); open(p, 'a', encoding='utf-8').write('\\n')"

          python3 -m json.tool packaging/packages.json > /dev/null
          cp packaging/packages.json release/packages.json

          export PACKAGES_SHA256
          PACKAGES_SHA256="$(sha256sum release/packages.json | cut -d' ' -f1)"
          export UPDATE_TIMESTAMP
          UPDATE_TIMESTAMP="$(date -u +%s)"
          export UPDATE_TIME_UTC
          UPDATE_TIME_UTC="$(date -u +"%Y-%m-%d %H:%M:%S")"
          export PACKAGES_URL="https://github.com/${REPO}/releases/latest/download/packages.json"

          python3 - <<'PY'
          import json
          import os

          repository = {
              "$schema": "https://go.kicad.org/pcm/schemas/v1#/definitions/Repository",
              "name": "FiberLaserCam repository",
              "maintainer": {
                  "name": "AntumArk",
                  "contact": {"web": "https://github.com/AntumArk/FiberLaserCam"},
              },
              "packages": {
                  "url": os.environ["PACKAGES_URL"],
                  "sha256": os.environ["PACKAGES_SHA256"],
                  "update_timestamp": int(os.environ["UPDATE_TIMESTAMP"]),
                  "update_time_utc": os.environ["UPDATE_TIME_UTC"],
              },
          }

          with open("release/repository.json", "w", encoding="utf-8") as f:
              json.dump(repository, f, indent=2)
              f.write("\n")
          PY

          python3 -m json.tool release/repository.json > /dev/null

      - name: Build AppImage
        id: appimage
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.vars.outputs.version }}"
          APPDIR="appimage/AppDir"

          rm -rf appimage
          mkdir -p "${APPDIR}/usr/bin" "${APPDIR}/usr/share/icons/hicolor/256x256/apps"

          cp offline_export.py minidxf.py app_geometry.py app_sessions.py contour_offsets.py "${APPDIR}/usr/bin/"

          cp packaging/appimage/AppRun "${APPDIR}/AppRun"
          chmod +x "${APPDIR}/AppRun"
          cp packaging/appimage/fiberlasercam.desktop "${APPDIR}/fiberlasercam.desktop"
          cp packaging/icon.png "${APPDIR}/fiberlasercam.png"
          cp packaging/icon.png "${APPDIR}/usr/share/icons/hicolor/256x256/apps/fiberlasercam.png"

          curl -fsSL -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          APPIMAGE_NAME="FiberLaserCam-${VERSION}-x86_64.AppImage"
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool "${APPDIR}" "release/${APPIMAGE_NAME}"

          sha256sum "release/${APPIMAGE_NAME}" > "release/${APPIMAGE_NAME}.sha256"

          echo "appimage_name=${APPIMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FiberLaserCam-${{ steps.vars.outputs.version }}
          path: |
            release/${{ steps.build.outputs.zip_name }}
            release/${{ steps.build.outputs.zip_name }}.sha256
            release/metadata.json
            release/packages.json
            release/repository.json
            release/${{ steps.appimage.outputs.appimage_name }}
            release/${{ steps.appimage.outputs.appimage_name }}.sha256

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.version }}
          name: FiberLaserCam ${{ steps.vars.outputs.version }}
          files: |
            release/${{ steps.build.outputs.zip_name }}
            release/${{ steps.build.outputs.zip_name }}.sha256
            release/metadata.json
            release/packages.json
            release/repository.json
            release/${{ steps.appimage.outputs.appimage_name }}
            release/${{ steps.appimage.outputs.appimage_name }}.sha256
          generate_release_notes: true

      - name: Commit updated packages.json ledger
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # The checkout is a detached HEAD at the release tag, which may be
          # behind main if other commits landed on main meanwhile. Replay our
          # ledger update on top of the current main tip instead of force
          # -pushing the tag's (possibly stale) history over it. This runs
          # last so switching branches here can't affect any earlier build
          # step's source tree.
          cp release/packages.json /tmp/packages.json.new
          git fetch origin main
          git checkout -B main origin/main
          cp /tmp/packages.json.new packaging/packages.json
          python3 -m json.tool packaging/packages.json > /dev/null

          git add packaging/packages.json
          if git diff --cached --quiet; then
            echo "packaging/packages.json already up to date on main, nothing to commit"
            exit 0
          fi
          git commit -m "chore: record ${{ steps.vars.outputs.version }} in packages.json"

          # Best-effort: this ledger commit is a convenience for future
          # builds/pre-push runs. Don't fail the whole release if it can't
          # be pushed (e.g. a race with another concurrent release).
          git push origin HEAD:main || echo "warning: failed to push packages.json ledger update to main" >&2
