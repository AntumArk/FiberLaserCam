<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">FiberLaserCam Workflow Overview</title>
  <desc id="desc">Diagram showing KiCad launch, DXF generation, browser preview path, and direct export path.</desc>
  <defs>
    <style>
      .bg { fill: #f6f7f3; }
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #1f2d1f; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #314431; }
      .node { fill: #ffffff; stroke: #2b4a2f; stroke-width: 2.5; rx: 16; }
      .node-alt { fill: #f0f7ef; stroke: #2b4a2f; stroke-width: 2.5; rx: 16; }
      .text { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #1f2d1f; }
      .small { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #2e412e; }
      .arrow { stroke: #355e3b; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .branch { stroke: #9a4f21; stroke-width: 3; fill: none; marker-end: url(#arrowheadWarm); }
      .chip { fill: #ffe8d7; stroke: #b55a22; stroke-width: 1.5; rx: 10; }
      .chiptext { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #7a3a13; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#355e3b"/>
    </marker>
    <marker id="arrowheadWarm" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#9a4f21"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="520"/>
  <text class="title" x="40" y="54">FiberLaserCam Plugin Workflow</text>
  <text class="subtitle" x="40" y="82">One launcher, two export paths: preview-driven or direct</text>

  <rect class="node" x="40" y="130" width="240" height="92"/>
  <text class="text" x="62" y="168">1) Click KiCad plugin</text>
  <text class="small" x="62" y="193">Toolbar button in PCB Editor</text>

  <rect class="node" x="340" y="130" width="300" height="92"/>
  <text class="text" x="362" y="168">2) Settings dialog</text>
  <text class="small" x="362" y="193">Layer + per-layer persistent controls</text>

  <rect class="node" x="700" y="130" width="250" height="92"/>
  <text class="text" x="722" y="168">3) Export DXF from KiCad</text>
  <text class="small" x="722" y="193">Stored in temp_dxf/</text>

  <rect class="node-alt" x="980" y="90" width="180" height="82"/>
  <text class="text" x="1002" y="124">A) Web Preview</text>
  <text class="small" x="1002" y="146">Open browser UI</text>

  <rect class="node-alt" x="980" y="200" width="180" height="82"/>
  <text class="text" x="1002" y="234">B) Direct Export</text>
  <text class="small" x="1002" y="256">No preview window</text>

  <rect class="node" x="980" y="346" width="180" height="92"/>
  <text class="text" x="1002" y="380">Final DXF</text>
  <text class="small" x="1002" y="405">HATCH_GEN output</text>

  <path class="arrow" d="M280 176 L340 176"/>
  <path class="arrow" d="M640 176 L700 176"/>
  <path class="arrow" d="M950 176 L980 132"/>
  <path class="branch" d="M950 176 L980 242"/>
  <path class="arrow" d="M1070 172 L1070 346"/>
  <path class="branch" d="M1070 282 L1070 346"/>

  <rect class="chip" x="348" y="250" width="190" height="34"/>
  <text class="chiptext" x="364" y="272">Per-layer mode memory</text>

  <rect class="chip" x="548" y="250" width="190" height="34"/>
  <text class="chiptext" x="564" y="272">Edge.Cuts outer-only option</text>

  <rect class="chip" x="748" y="250" width="150" height="34"/>
  <text class="chiptext" x="764" y="272">Layer name in UI</text>
</svg>
