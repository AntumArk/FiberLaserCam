<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiber Laser DXF Hatch Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <main class="layout">
      <section class="panel controls">
        <h1>DXF Hatch Converter</h1>
        <p class="sub">Upload a KiCad isolation DXF, click zones to select, then export hatch lines.</p>
        <p class="sub" id="layerHint">Layer: unknown</p>

        <label class="file-pick">
          <span>Upload DXF</span>
          <input id="fileInput" type="file" accept=".dxf" />
        </label>

        <div class="field-grid">
          <label>
            Mode
            <select id="modeInput">
              <option value="hatch" selected>Rectilinear Hatch</option>
              <option value="contour_offsets">Contour Offsets</option>
            </select>
          </label>
          <label>
            Hatch angle (deg)
            <input id="angleInput" type="number" value="45" step="1" />
          </label>
          <label>
            Hatch spacing
            <input id="spacingInput" type="number" value="0.02" step="0.01" min="0.001" />
          </label>
          <label>
            <input id="manualSpacingInput" type="checkbox" />
            Use manual spacing
          </label>
          <label>
            Laser radius
            <input id="radiusInput" type="number" value="0.01" step="0.01" min="0" />
          </label>
          <label>
            Minimum hatch area (mm²)
            <input id="minAreaInput" type="number" value="0.30" step="0.01" min="0" />
          </label>
          <label>
            Start distance from contour
            <input id="offsetStartInput" type="number" value="0.02" step="0.01" min="0" />
          </label>
          <label>
            Offset spacing
            <input id="offsetSpacingInput" type="number" value="0.02" step="0.01" min="0" />
          </label>
          <label>
            Offset count
            <input id="offsetCountInput" type="number" value="3" step="1" min="1" />
          </label>
          <label>
            <input id="hatchAllInput" type="checkbox" />
            Hatch every closed object
          </label>
          <label>
            <input id="outerZoneOnlyInput" type="checkbox" />
            Hatch outer zone only (largest)
          </label>
        </div>

        <div class="actions">
          <button id="clearBtn" type="button">Clear Selection</button>
          <button id="exportBtn" type="button" disabled>Export DXF</button>
        </div>

        <div class="stats">
          <div><strong id="zoneCount">0</strong> zones detected</div>
          <div><strong id="selectedCount">0</strong> zones selected</div>
          <div><strong id="segmentCount">0</strong> hatch segments</div>
        </div>

        <p id="status" class="status">Waiting for DXF upload.</p>
      </section>

      <section class="panel viewer">
        <canvas id="canvas" width="1200" height="800"></canvas>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
